name: Release

# Triggered on every push to main.
#
# Step 1 — release-please inspects commits since the last release:
#   - If releasable commits exist (feat/fix/breaking), it opens or updates
#     a "chore: release X.Y.Z" PR with an updated CHANGELOG and deno.json version.
#   - Maintainers review and merge that PR when ready.
#   - On merge of the Release PR, release-please creates the tag + GitHub release.
#
# Step 2 — Once a release is created, the build matrix compiles platform binaries
#   and attaches them to the GitHub release automatically.

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Step 1: Open / update the Release PR ───────────────────────────────────
  release-please:
    name: Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Validate release tag format
        if: ${{ steps.rp.outputs.release_created == 'true' }}
        shell: bash
        run: |
          tag='${{ steps.rp.outputs.tag_name }}'
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected SemVer tag format vX.Y.Z but got: $tag"
            exit 1
          fi

      - uses: actions/checkout@v5
        if: ${{ steps.rp.outputs.release_created == 'true' }}

      - name: Normalize release title
        if: ${{ steps.rp.outputs.release_created == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          component="$(jq -r '.packages["."].component // empty' release-please-config.json)"
          if [[ -z "$component" || "$component" == "null" ]]; then
            echo "Missing required component in release-please-config.json at .packages[\".\"].component"
            exit 1
          fi

          tag='${{ steps.rp.outputs.tag_name }}'
          gh release edit "$tag" --title "$component: $tag"

  # ── Step 2: Build binaries and attach to the new release ───────────────────
  build:
    name: Build ${{ matrix.artifact }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: nfauth-macos-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nfauth-macos-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nfauth-linux-x64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nfauth-windows-x64.exe

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          deno compile \
            --allow-env --allow-net --allow-read --allow-write --allow-run \
            --target ${{ matrix.target }} \
            --output dist/${{ matrix.artifact }} \
            main.ts

      - name: Attach to GitHub Release
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} dist/${{ matrix.artifact }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
